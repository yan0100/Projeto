<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Estoque</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
<div class="card mx-auto shadow-lg" style="width: 400px; border-radius: 15px;">
    <div class="card-body p-5">
        <h2 class="text-center mb-4">🔐 Login</h2>
        <div th:if="${param.erro}" class="alert alert-danger p-2 text-center">Usuário ou senha inválidos!</div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">ID do Usuário</label>
                <input type="text" name="id" class="form-control" placeholder="Digite seu ID/Login" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar no Sistema</button>
        </form>
    </div>
</div>
</body>
</html>
