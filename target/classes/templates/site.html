<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Estoque Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .sidebar { height: 100vh; background: #212529; color: white; padding: 20px; }
        .card-alerta { border-left: 5px solid #dc3545; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-2">
        <h3>Estoque v2</h3>
        <hr>
        <p>Olá, <span th:text="${usuarioLogado.nome}">Usuário</span></p>
        <nav class="nav flex-column">
            <a class="nav-link text-white" href="#">📦 Produtos</a>
            <a class="nav-link text-white" href="#" th:if="${usuarioLogado.cargo == 'ADMIN'}">📊 Relatórios</a>
            <a class="nav-link text-white" href="#">🚪 Sair</a>
        </nav>
    </div>

    <div class="container-fluid p-4">
        <h2>Painel de Controle</h2>

        <div class="alert alert-danger card-alerta" role="alert" th:if="${not #lists.isEmpty(alertas)}">
            <strong>Atenção!</strong> Existem itens vencendo ou com estoque baixo.
        </div>

        <table class="table table-hover mt-4">
            <thead class="table-dark">
            <tr>
                <th>Produto</th>
                <th>Lote</th>
                <th>Qtd</th>
                <th>Validade</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="lote : ${lotes}">
                <td th:text="${lote.produto.nome}">Produto</td>
                <td th:text="${lote.codigoLote}">L001</td>
                <td th:text="${lote.quantidade}">10</td>
                <td th:text="${lote.dataValidade}">2026-05-10</td>
                <td>
                    <span class="badge bg-success" th:if="${lote.quantidade > 10}">Normal</span>
                    <span class="badge bg-warning" th:if="${lote.quantidade <= 10}">Baixo</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
