<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Estoque Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .sidebar { height: 100vh; background: #2c3e50; color: white; padding: 20px; }
        .badge-admin { background-color: #e74c3c; }
        .badge-vendedor { background-color: #27ae60; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar shadow">
            <h4>📦 Estoque Pro</h4>
            <hr>
            <p>Bem-vindo, <br><strong th:text="${usuario.nome}">Nome</strong></p>
            <span class="badge mb-4" th:classappend="${usuario.cargo == 'ADMIN' ? 'badge-admin' : 'badge-vendedor'}" th:text="${usuario.cargo}">CARGO</span>

            <nav class="nav flex-column">
                <a class="nav-link text-white" href="/dashboard">📊 Painel Geral</a>

                <a class="nav-link text-white" href="/produtos/novo" th:if="${usuario.cargo == 'ADMIN' or usuario.cargo == 'ESTOQUISTA'}">🆕 Cadastrar Produto</a>
                <a class="nav-link text-white" href="/lotes/entrada" th:if="${usuario.cargo == 'ADMIN' or usuario.cargo == 'ESTOQUISTA'}">📥 Entrada de Lote</a>

                <a class="nav-link text-white" href="/vendas/registrar">🛒 Registrar Venda</a>

                <a class="nav-link text-white" href="/relatorios/movimentacoes" th:if="${usuario.cargo == 'ADMIN'}">📜 Histórico/Relatórios</a>

                <hr>
                <a class="nav-link text-white" href="/logout">🚪 Sair</a>
            </nav>
        </div>

        <div class="col-md-10 p-5">
            <h3>Resumo de Lotes e Validades</h3>

            <div th:each="alerta : ${alertas}" class="alert alert-warning">
                ⚠️ <strong>Atenção:</strong> O lote <span th:text="${alerta.codigo}"></span> do produto
                <span th:text="${alerta.produto.nome}"></span> vence em <span th:text="${alerta.dataValidade}"></span>!
            </div>

            <div class="card shadow-sm mt-4">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Produto</th>
                        <th>Código do Lote</th>
                        <th>Quantidade</th>
                        <th>Validade</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${lotes}">
                        <td th:text="${l.produto.nome}">Produto</td>
                        <td th:text="${l.codigo}">L000</td>
                        <td th:text="${l.quantidade}">0</td>
                        <td th:text="${l.dataValidade != null ? l.dataValidade : 'Indeterminado'}">00/00/00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
